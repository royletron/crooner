name: Crooner
options:
  bundleIdPrefix: com.crooner
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.7.5"

targets:
  Crooner:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: Crooner
    info:
      path: Crooner/Info.plist
      properties:
        LSUIElement: true
        NSCameraUsageDescription: Crooner uses your camera to show a webcam bubble in your recordings.
        NSMicrophoneUsageDescription: Crooner uses your microphone to record audio narration.
        NSScreenCaptureUsageDescription: Crooner needs screen recording access to capture your screen.
        SUFeedURL: https://raw.githubusercontent.com/royletron/crooner/main/appcast.xml
        # Generate your EdDSA key pair with Sparkle's `generate_keys` tool (see RELEASING.md).
        # Paste the resulting public key here and store the private key as SPARKLE_PRIVATE_KEY in GitHub Actions secrets.
        SUPublicEDKey: REPLACE_WITH_YOUR_ED25519_PUBLIC_KEY
    entitlements:
      path: Crooner/Crooner.entitlements
      properties:
        com.apple.security.device.camera: true
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.crooner.app
        SWIFT_VERSION: "5.9"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
    dependencies:
      - sdk: ScreenCaptureKit.framework
      - sdk: AVFoundation.framework
      - sdk: VideoToolbox.framework
      - sdk: CoreVideo.framework
      - package: Sparkle
        product: Sparkle
