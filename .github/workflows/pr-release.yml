name: PR Release

# Fires whenever a PR is closed against main.
# If the PR was merged AND carries a release label the workflow computes
# the next semver tag and pushes it, which in turn triggers release.yml
# to build, sign, notarise, and publish the DMG.
#
# Supported labels:
#   release: patch  →  x.y.Z+1
#   release: minor  →  x.Y+1.0
#   release: major  →  X+1.0.0

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  tag:
    # Only run when the PR was actually merged and carries a release label.
    if: >-
      github.event.pull_request.merged == true &&
      (
        contains(github.event.pull_request.labels.*.name, 'release: patch') ||
        contains(github.event.pull_request.labels.*.name, 'release: minor') ||
        contains(github.event.pull_request.labels.*.name, 'release: major')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (full history for tag enumeration)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type from PR label
        id: bump
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          if echo "$LABELS" | grep -q 'release: major'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q 'release: minor'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        id: version
        run: |
          # Find the latest vX.Y.Z tag; default to v0.0.0 if none exists yet.
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          [ -z "$LATEST" ] && LATEST="v0.0.0"

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            *)     PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Bumping $LATEST → $NEW_TAG (type: ${{ steps.bump.outputs.type }})"

      - name: Push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
