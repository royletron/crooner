name: Release

# Triggered when a PR labelled release: patch / minor / major merges into main.
# Computes the next semver tag, pushes it, then builds, signs, notarises,
# and publishes the DMG — all in one job so there's no cross-workflow
# token boundary to cross.

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      (
        contains(github.event.pull_request.labels.*.name, 'release: patch') ||
        contains(github.event.pull_request.labels.*.name, 'release: minor') ||
        contains(github.event.pull_request.labels.*.name, 'release: major')
      )
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (full history for tag enumeration)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Version ────────────────────────────────────────────────────────

      - name: Determine bump type from PR label
        id: bump
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          if echo "$LABELS" | grep -q 'release: major'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q 'release: minor'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          [ -z "$LATEST" ] && LATEST="v0.0.0"
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            *)     PATCH=$((PATCH + 1)) ;;
          esac
          echo "tag=v${MAJOR}.${MINOR}.${PATCH}"   >> "$GITHUB_OUTPUT"
          echo "value=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      # ── Build ──────────────────────────────────────────────────────────

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$CERTIFICATE_BASE64" | tr -d '\n' | base64 --decode > /tmp/certificate.p12

          echo "Certificate file size: $(wc -c < /tmp/certificate.p12) bytes"
          openssl pkcs12 \
            -in /tmp/certificate.p12 \
            -noout \
            -passin "pass:$(echo "$CERTIFICATE_PASSWORD" | tr -d '\n')" \
            && echo "PKCS12 password verified OK" \
            || echo "PKCS12 verification FAILED — wrong password or corrupt file"

          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$(echo "$CERTIFICATE_PASSWORD" | tr -d '\n')" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/certificate.p12

      - name: Inject team ID into ExportOptions.plist
        run: |
          /usr/libexec/PlistBuddy -c \
            "Set :teamID ${{ secrets.APPLE_TEAM_ID }}" ExportOptions.plist

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme Crooner \
            -configuration Release \
            -archivePath build/Crooner.xcarchive \
            -allowProvisioningUpdates

      - name: Export (Developer ID)
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Crooner.xcarchive \
            -exportPath   build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize app
        run: |
          ditto -c -k --keepParent build/export/Crooner.app build/Crooner.zip
          xcrun notarytool submit build/Crooner.zip \
            --apple-id  "${{ secrets.APPLE_ID }}" \
            --password  "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id   "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple build/export/Crooner.app

      - name: Build DMG
        run: |
          create-dmg \
            --volname "Crooner" \
            --window-pos  200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "Crooner.app" 150 185 \
            --app-drop-link 450 185 \
            "build/Crooner-${{ steps.version.outputs.value }}.dmg" \
            "build/export/"

      - name: Notarize DMG
        run: |
          xcrun notarytool submit \
            "build/Crooner-${{ steps.version.outputs.value }}.dmg" \
            --apple-id  "${{ secrets.APPLE_ID }}" \
            --password  "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id   "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple \
            "build/Crooner-${{ steps.version.outputs.value }}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: build/Crooner-${{ steps.version.outputs.value }}.dmg
          generate_release_notes: true
