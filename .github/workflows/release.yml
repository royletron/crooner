name: Release

# Triggered when a PR labelled release: patch / minor / major merges into main.
# Computes the next semver tag, pushes it, then builds, signs, notarises,
# and publishes the DMG — all in one job so there's no cross-workflow
# token boundary to cross.

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Allows manually re-running the build for an existing tag (e.g. if the
  # automatic run failed or the tag was created before this workflow existed).
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v1.0.3)'
        required: true

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        (
          contains(github.event.pull_request.labels.*.name, 'release: patch') ||
          contains(github.event.pull_request.labels.*.name, 'release: minor') ||
          contains(github.event.pull_request.labels.*.name, 'release: major')
        )
      )
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (full history for tag enumeration)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Version ────────────────────────────────────────────────────────

      - name: Resolve version
        id: version
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          if [ -n "$MANUAL_TAG" ]; then
            # Manual dispatch — use the supplied tag as-is, no bump needed.
            TAG="$MANUAL_TAG"
          else
            # PR merge — compute next tag from the highest existing semver tag.
            LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
            [ -z "$LATEST" ] && LATEST="v0.0.0"
            VERSION="${LATEST#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            if echo "$LABELS" | grep -q 'release: major'; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif echo "$LABELS" | grep -q 'release: minor'; then
              MINOR=$((MINOR + 1)); PATCH=0
            else
              PATCH=$((PATCH + 1))
            fi
            TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "value=${TAG#v}"       >> "$GITHUB_OUTPUT"

      - name: Push tag
        # Skip if the tag already exists (manual re-run of an existing tag).
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${{ steps.version.outputs.tag }}"
            git push origin "${{ steps.version.outputs.tag }}"
          fi

      # ── Build ──────────────────────────────────────────────────────────

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Install Sparkle CLI tools
        run: |
          SPARKLE_VER="2.7.5"
          curl -fsSL \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VER}/Sparkle-${SPARKLE_VER}.tar.xz" \
            -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle
          tar xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          echo "/tmp/sparkle/bin" >> "$GITHUB_PATH"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$CERTIFICATE_BASE64" | tr -d '\n' | base64 --decode > /tmp/certificate.p12

          echo "Certificate file size: $(wc -c < /tmp/certificate.p12) bytes"
          openssl pkcs12 \
            -in /tmp/certificate.p12 \
            -noout \
            -passin "pass:$(echo "$CERTIFICATE_PASSWORD" | tr -d '\n')" \
            && echo "PKCS12 password verified OK" \
            || echo "PKCS12 verification FAILED — wrong password or corrupt file"

          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$(echo "$CERTIFICATE_PASSWORD" | tr -d '\n')" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/certificate.p12

      - name: Inject team ID into ExportOptions.plist
        run: |
          /usr/libexec/PlistBuddy -c \
            "Set :teamID ${{ secrets.APPLE_TEAM_ID }}" ExportOptions.plist

      - name: Archive
        run: |
          xcodebuild archive \
            -scheme Crooner \
            -configuration Release \
            -archivePath build/Crooner.xcarchive \
            MARKETING_VERSION="${{ steps.version.outputs.value }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.value }}" \
            -allowProvisioningUpdates

      - name: Export (Developer ID)
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Crooner.xcarchive \
            -exportPath   build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize app
        run: |
          ditto -c -k --keepParent build/export/Crooner.app build/Crooner.zip
          xcrun notarytool submit build/Crooner.zip \
            --apple-id  "${{ secrets.APPLE_ID }}" \
            --password  "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id   "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple build/export/Crooner.app

      - name: Build DMG
        run: |
          mkdir -p build/dmg-staging
          cp -R build/export/Crooner.app build/dmg-staging/
          create-dmg \
            --volname "Crooner" \
            --window-pos  200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "Crooner.app" 150 185 \
            --app-drop-link 450 185 \
            "build/Crooner-${{ steps.version.outputs.value }}.dmg" \
            "build/dmg-staging/"

      - name: Notarize DMG
        run: |
          xcrun notarytool submit \
            "build/Crooner-${{ steps.version.outputs.value }}.dmg" \
            --apple-id  "${{ secrets.APPLE_ID }}" \
            --password  "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id   "${{ secrets.APPLE_TEAM_ID }}" \
            --wait
          xcrun stapler staple \
            "build/Crooner-${{ steps.version.outputs.value }}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: build/Crooner-${{ steps.version.outputs.value }}.dmg
          generate_release_notes: true

      # ── Appcast ────────────────────────────────────────────────────────

      - name: Update appcast.xml
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          APP_VERSION: ${{ steps.version.outputs.value }}
          APP_TAG: ${{ steps.version.outputs.tag }}
        run: |
          DMG="build/Crooner-${APP_VERSION}.dmg"

          # Sign the DMG with the EdDSA private key.
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          SPARKLE_SIG=$(sign_update "$DMG" -f /tmp/sparkle_key)
          rm /tmp/sparkle_key

          SPARKLE_SIZE=$(wc -c < "$DMG" | tr -d ' ')
          SPARKLE_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          SPARKLE_URL="https://github.com/royletron/crooner/releases/download/${APP_TAG}/Crooner-${APP_VERSION}.dmg"

          SPARKLE_SIG="$SPARKLE_SIG" \
          SPARKLE_SIZE="$SPARKLE_SIZE" \
          SPARKLE_DATE="$SPARKLE_DATE" \
          SPARKLE_URL="$SPARKLE_URL" \
          python3 << 'PYEOF'
import xml.etree.ElementTree as ET
import os

version  = os.environ["APP_VERSION"]
sig      = os.environ["SPARKLE_SIG"]
size     = int(os.environ["SPARKLE_SIZE"])
url      = os.environ["SPARKLE_URL"]
date     = os.environ["SPARKLE_DATE"]

SPARKLE_NS = "http://www.andymatuschak.org/xml-namespaces/sparkle"
ET.register_namespace("sparkle", SPARKLE_NS)
ET.register_namespace("dc", "http://purl.org/dc/elements/1.1/")

tree    = ET.parse("appcast.xml")
root    = tree.getroot()
channel = root.find("channel")

item = ET.Element("item")
ET.SubElement(item, "title").text = f"Version {version}"
ET.SubElement(item, "pubDate").text = date
ET.SubElement(item, f"{{{SPARKLE_NS}}}version").text = version
ET.SubElement(item, f"{{{SPARKLE_NS}}}shortVersionString").text = version
ET.SubElement(item, f"{{{SPARKLE_NS}}}minimumSystemVersion").text = "13.0"
enc = ET.SubElement(item, "enclosure")
enc.set("url", url)
enc.set("type", "application/octet-stream")
enc.set(f"{{{SPARKLE_NS}}}edSignature", sig)
enc.set("length", str(size))

# Newest item first so Sparkle picks it up immediately.
first = channel.find("item")
if first is not None:
    channel.insert(list(channel).index(first), item)
else:
    channel.append(item)

ET.indent(tree, space="  ")
tree.write("appcast.xml", xml_declaration=True, encoding="UTF-8")
print(f"appcast.xml updated for {version}")
PYEOF

      - name: Commit updated appcast
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: update appcast for ${{ steps.version.outputs.tag }}"
          git push origin HEAD:main
